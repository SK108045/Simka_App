name: simka_app
description: SIMKA TECHNOLOGIES Fire Services - Client Management & Notification App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Local notifications (Android)
  flutter_local_notifications: ^18.0.1

  # Lightweight local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # State management
  provider: ^6.1.2

  # Date/time picker & formatting
  intl: ^0.19.0
  table_calendar: ^3.1.2

  # Timezone support (required for notifications scheduling)
  timezone: ^0.9.4

  # UUID generator for unique client IDs
  uuid: ^4.5.1

  # Icons
  cupertino_icons: ^1.0.8

  # WhatsApp & URL launching
  url_launcher: ^6.3.1

  # Charts for Reports screen
  fl_chart: ^0.70.2

  # PDF generation & printing/sharing
  pdf: ^3.11.1
  printing: ^5.13.3
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  open_file: ^3.5.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/simka_logo.jpg

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21
